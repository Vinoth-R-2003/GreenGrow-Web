{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto px-4">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-emerald-600 px-8 py-6">
            <h2 class="text-2xl font-bold text-white">List Your Produce</h2>
            <p class="text-emerald-100 mt-1">Reach customers directly with your fresh harvest.</p>
        </div>

        <form method="post" enctype="multipart/form-data" class="p-8 space-y-6">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <p class="text-xs text-red-500 mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <div class="pt-4">
                <button type="submit"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-200 transition-all transform active:scale-95">
                    Publish Listing
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

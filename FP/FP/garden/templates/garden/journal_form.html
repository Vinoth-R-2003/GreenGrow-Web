{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <div class="mb-8">
        <a href="{% url 'plant_journal' user_plant.id %}"
            class="text-slate-500 hover:text-emerald-600 flex items-center gap-1 mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Journal
        </a>
        <h2 class="text-3xl font-bold text-slate-900">Add Journal Entry</h2>
        <p class="text-slate-500 mt-1">For {{ user_plant.plant.name }}</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
        {% csrf_token %}

        <div class="mb-6">
            <label for="title" class="block text-sm font-medium text-slate-700 mb-2">Title</label>
            <input type="text" name="title" id="title" required placeholder="e.g., First Sprout, Height Update..."
                class="w-full rounded-lg border-slate-300 focus:border-emerald-500 focus:ring-emerald-500">
        </div>

        <div class="mb-6">
            <label for="content" class="block text-sm font-medium text-slate-700 mb-2">Notes</label>
            <textarea name="content" id="content" rows="4" required placeholder="Write your observations here..."
                class="w-full rounded-lg border-slate-300 focus:border-emerald-500 focus:ring-emerald-500"></textarea>
        </div>

        <div class="mb-8">
            <label for="image" class="block text-sm font-medium text-slate-700 mb-2">Photo (Optional)</label>
            <input type="file" name="image" id="image" accept="image/*"
                class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
        </div>

        <button type="submit"
            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">
            Save Entry
        </button>
    </form>
</div>
{% endblock %}

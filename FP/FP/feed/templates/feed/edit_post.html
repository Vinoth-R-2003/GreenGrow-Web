{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto px-4">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <h2 class="text-2xl font-bold text-slate-900 mb-6">Edit Post</h2>

        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-4">
                {{ form.content }}

                {% if post.image %}
                <div id="current-image-container" class="mt-4 mb-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <p class="text-sm font-bold text-slate-700 mb-3">Current Image</p>
                    <div class="relative inline-block">
                        <img src="{{ post.image.url }}" alt="Current post image"
                            class="h-48 rounded-lg object-cover shadow-sm border border-slate-200">
                    </div>

                    <div class="mt-4 flex items-center">
                        <input type="hidden" id="remove_image" name="remove_image" value="false">
                        <button type="button"
                            onclick="document.getElementById('current-image-container').classList.add('hidden'); document.getElementById('remove_image').value='true';"
                            class="flex items-center gap-2 px-4 py-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition-colors font-semibold text-sm shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                                    clip-rule="evenodd" />
                            </svg>
                            Delete Image
                        </button>
                    </div>
                </div>
                {% endif %}

                <div class="mt-4">
                    <div
                        class="mt-2 border-2 border-dashed border-slate-300 rounded-xl p-6 hover:border-emerald-500 hover:bg-slate-50 transition-colors text-center">
                        <label for="post-image-input" class="cursor-pointer flex flex-col items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400 mb-2" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <span class="text-slate-700 font-semibold mb-1">Click to upload a new image</span>
                            <span class="text-slate-400 text-xs">Leave blank to keep your current image</span>
                        </label>
                        {{ form.image }}
                        <div id="file-name-display" class="mt-3 text-sm font-bold text-emerald-600 hidden"></div>
                    </div>
                </div>

                <script>
                    document.getElementById('post-image-input').addEventListener('change', function (e) {
                        const display = document.getElementById('file-name-display');
                        if (this.files && this.files.length > 0) {
                            display.textContent = 'Selected File: ' + this.files[0].name;
                            display.classList.remove('hidden');
                        } else {
                            display.classList.add('hidden');
                        }
                    });
                </script>
            </div>

            <div class="flex gap-4 mt-8">
                <button type="submit"
                    class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 flex items-center justify-center rounded-lg transition-all shadow-md">
                    Save Changes
                </button>
                <a href="{% url 'index' %}"
                    class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 flex items-center justify-center rounded-lg transition-all text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

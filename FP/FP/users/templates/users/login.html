{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-slate-900">Welcome Back</h2>
            <p class="text-slate-500 mt-2">Sign in to access your farm network.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            {% if form.non_field_errors %}
            <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" name="username" autofocus required id="id_username"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" name="password" required id="id_password"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
            </div>

            <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg shadow-lg shadow-emerald-200 transition-all transform active:scale-95">
                Sign In
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-500">
            Don't have an account?
            <a href="{% url 'register' %}" class="font-semibold text-emerald-600 hover:text-emerald-500">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
